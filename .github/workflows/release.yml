name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS-arm64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
            binary-ext: ""
            # Path to the .app bundle produced by `tauri build`
            app-path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/meme-overlay.app

          - name: macOS-x86_64
            os: macos-13
            rust-target: x86_64-apple-darwin
            tauri-args: --target x86_64-apple-darwin
            binary-ext: ""
            app-path: src-tauri/target/x86_64-apple-darwin/release/bundle/macos/meme-overlay.app

          - name: Windows-x86_64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: --target x86_64-pc-windows-msvc
            binary-ext: ".exe"
            app-path: ""

    env:
      BINARY_NAME: meme-overlay

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm install

      - name: Sync version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          npm version "$TAG" --no-git-tag-version
          node -e "
            const fs = require('fs');
            const tag = '$TAG';
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \"[^\"]*\"/m, 'version = \"' + tag + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = tag;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Build Tauri app
        shell: bash
        run: npx tauri build ${{ matrix.tauri-args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Post-process the Tauri .app bundle: inject a launcher shell script as
      # CFBundleExecutable so that double-clicking opens the settings/server UI
      # (--mode server) rather than blocking on stdin in overlay mode.
      - name: Create server-mode DMG (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          chmod +x scripts/make-server-dmg.sh
          ./scripts/make-server-dmg.sh \
            "${{ matrix.app-path }}" \
            "meme-overlay-server-${{ matrix.rust-target }}.dmg" \
            "${APPLE_SIGNING_IDENTITY:-}"
        env:
          # Set this secret in your repo to enable codesigning.
          # Leave unset for unsigned (ad-hoc) builds.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      # Copy the bare binary under a platform-qualified name so all three
      # platforms can upload without filename collisions.
      - name: Rename client binary
        shell: bash
        run: |
          SRC="src-tauri/target/${{ matrix.rust-target }}/release/meme-overlay${{ matrix.binary-ext }}"
          cp "$SRC" "meme-overlay-${{ matrix.rust-target }}${{ matrix.binary-ext }}"

      # macOS: upload the CLI client binary + the server-mode DMG.
      # (The raw Tauri-generated DMG is not uploaded; it blocks on stdin and
      # is not useful to end-users as a standalone clickable app.)
      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            meme-overlay-${{ matrix.rust-target }}${{ matrix.binary-ext }}
            meme-overlay-server-${{ matrix.rust-target }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Windows: upload the CLI client binary + the MSI installer.
      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            meme-overlay-${{ matrix.rust-target }}${{ matrix.binary-ext }}
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          body: |
            ## Artifacts

            ### macOS — Client binary (CLI plugin use)

            Used by the opencode / Claude Code plugin.  Place it on `$PATH` and the
            plugin will call it automatically (defaults to overlay / stdin mode).

            | Architecture | File |
            |---|---|
            | Apple Silicon | `meme-overlay-aarch64-apple-darwin` |
            | Intel | `meme-overlay-x86_64-apple-darwin` |

            ```bash
            # Example install
            install -m 755 meme-overlay-aarch64-apple-darwin ~/.local/bin/meme-overlay
            ```

            ### macOS — Server DMG (double-click to open Settings)

            A standard `.app` bundle that launches the same binary with `--mode server`,
            opening the Settings / animation-management UI immediately on startup.

            | Architecture | File |
            |---|---|
            | Apple Silicon | `meme-overlay-server-aarch64-apple-darwin.dmg` |
            | Intel | `meme-overlay-server-x86_64-apple-darwin.dmg` |

            ### Windows

            | File | Description |
            |---|---|
            | `meme-overlay-x86_64-pc-windows-msvc.exe` | CLI client binary |
            | `.msi` | Windows installer |

            ## How the two macOS artifacts relate

            Both share the **same core binary** (`meme-overlay`).  The DMG's `.app`
            bundle contains a thin shell launcher (`launch-server.sh`) set as
            `CFBundleExecutable` in `Info.plist`.  The script simply calls the real
            binary with `--mode server`, so the Settings window opens on double-click.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
